name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - next
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify public repository metadata
        run: |
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f .swift-version

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-diff:
    runs-on: macos-latest
    timeout-minutes: 12

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Gate public API changes
        shell: bash
        run: .github/scripts/check-api-breaking-changes.sh

  package-tests:
    runs-on: macos-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run Swift package tests
        run: swift test --disable-xctest

  ios-playground:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate playground project
        working-directory: Examples/CometPlayground
        run: xcodegen generate

      - name: Select available iPhone simulator
        id: simulator
        run: |
          SIMULATOR_ID=$(.github/scripts/select-ios-simulator.sh)
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"

      - name: Boot selected simulator
        run: |
          xcrun simctl boot "${{ steps.simulator.outputs.id }}" || true
          xcrun simctl bootstatus "${{ steps.simulator.outputs.id }}" -b

      - name: Run iOS smoke tests
        working-directory: Examples/CometPlayground
        env:
          NSUnbufferedIO: "YES"
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project CometPlayground.xcodeproj \
            -scheme CometPlaygroundApp \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -derivedDataPath "$PWD/.derived-data" \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
          xcodebuild test-without-building \
            -project CometPlayground.xcodeproj \
            -scheme CometPlaygroundApp \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 120 \
            -maximum-test-execution-time-allowance 180 \
            -derivedDataPath "$PWD/.derived-data" \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
