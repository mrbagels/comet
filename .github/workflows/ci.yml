name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - next
      - master
  pull_request:

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify public repository metadata
        run: |
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f .swift-version

  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-diff:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Report public API changes
        shell: bash
        run: |
          set +e

          BASE_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -z "$BASE_TAG" ]]; then
            echo "No release tag found; skipping API diff."
            exit 0
          fi

          swift package diagnose-api-breaking-changes "$BASE_TAG" > api-diff.txt 2>&1
          STATUS=$?
          cat api-diff.txt

          {
            echo "### Public API diff"
            echo
            echo "Base tag: \`$BASE_TAG\`"
            echo
            echo '```'
            cat api-diff.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$STATUS" -ne 0 ]]; then
            echo "::warning::Public API differences detected against $BASE_TAG. Confirm CHANGELOG.md and release versioning reflect the change."
          fi

          exit 0

  package-tests:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run Swift package tests
        run: swift test

  ios-playground:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Generate playground project
        working-directory: Examples/CometPlayground
        run: xcodegen generate

      - name: Select available iPhone simulator
        id: simulator
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available --json | ruby -rjson -e '
            devices = JSON.parse(STDIN.read).fetch("devices").values.flatten
            candidates = devices.select { |device| device["isAvailable"] && device["name"].start_with?("iPhone") }
            preferred_names = ["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"]
            device = preferred_names.lazy.map { |name| candidates.find { |candidate| candidate["name"] == name } }.find(&:itself) || candidates.first
            abort("No available iPhone simulator found.") unless device
            print device["udid"]
          ')
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"

      - name: Run iOS smoke tests
        working-directory: Examples/CometPlayground
        run: |
          xcodebuild test \
            -project CometPlayground.xcodeproj \
            -scheme CometPlaygroundApp \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}"
